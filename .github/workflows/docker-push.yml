name: Docker Build and Push

# Kịch bản này sẽ tự chạy mỗi khi bạn đẩy code lên nhánh 'main'
on:
  push:
    branches: [ "main" ] 

jobs:
  build:
    runs-on: ubuntu-latest # GitHub sẽ cấp một máy ảo Linux miễn phí để chạy

    steps:
    - name: 1. Lấy code từ GitHub về máy ảo
      uses: actions/checkout@v4

    - name: 2. Đăng nhập vào Docker Hub bằng chìa khóa đã lưu
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 3. Đọc Dockerfile, Build và Đẩy lên Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          satruong/fookit:BE
          satruong/fookit:BE-${{ github.run_number }}