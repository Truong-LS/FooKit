version: '3.8'

services:
  api:
    image: satruong/fookit:BE
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_CONNECTION_STRING=Server=db,1433;Database=FooKit;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-15}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${DB_PASSWORD}' -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./docker/mssql:/sql-scripts
    user: root
    entrypoint: [ "/bin/bash", "-c" ]
    command: 
      - |
        echo "Running initialization script..."
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "${DB_PASSWORD}" -No -i /sql-scripts/init.sql || echo "Script execution failed or DB already initialized."
        echo "Initialization finished."

volumes:
  sql_data:
